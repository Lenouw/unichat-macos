appId: com.unichat.app
productName: UniChat
copyright: Copyright © 2026

publish:
  provider: github
  owner: Lenouw
  repo: unichat-macos

mac:
  category: public.app-category.social-networking
  target:
    - target: dmg
      arch: [arm64, x64]
    - target: zip
      arch: [arm64, x64]
  icon: resources/icon.png
  darkModeSupport: true
  hardenedRuntime: true
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist
  extendInfo:
    NSMicrophoneUsageDescription: "UniChat a besoin du microphone pour les messages vocaux et appels WhatsApp."
    NSCameraUsageDescription: "UniChat a besoin de la caméra pour les appels vidéo WhatsApp."

dmg:
  title: UniChat
  window:
    width: 540
    height: 380

files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.*'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
